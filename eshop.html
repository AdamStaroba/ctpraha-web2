<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="CT Praha e-shop – kancelářská a laminovací technika, fólie a příslušenství." />
  <title>CT Praha | E-shop</title>

  <style>
    :root{
      --bg:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --muted2:#64748b;
      --border:#e8eef6;
      --soft:#f6f7fb;
      --shadow:0 18px 45px rgba(15,23,42,.10);
      --shadow2:0 8px 22px rgba(15,23,42,.08);
      --radius:18px;
      --container:1180px;

      --brand:#e11d2e;
      --brand-dark:#b70f1c;
      --ring: 0 0 0 4px rgba(225,29,46,.22);
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:var(--bg);
      line-height:1.5;
    }
    a{ color:inherit; text-decoration:none; }
    .container{ width:min(var(--container), calc(100% - 40px)); margin:0 auto; }

    /* Header */
    .header{
      position: sticky; top:0; z-index:50;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .header__inner{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding: 14px 0;
    }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand__mark{
      width:42px; height:42px; border-radius:14px;
      background:var(--brand); color:#fff;
      display:grid; place-items:center;
      font-weight:950; letter-spacing:.6px;
      box-shadow:var(--shadow2);
      user-select:none;
    }
    .brand__text strong{ display:block; }
    .brand__text small{ display:block; color:var(--muted); font-size:12px; margin-top:2px; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid transparent;
      font-weight:900;
      cursor:pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
      white-space:nowrap;
      background:#fff;
      color:var(--text);
    }
    .btn:active{ transform: translateY(1px); }
    .btn:focus{ outline:none; box-shadow: var(--ring); }
    .btn--primary{ background: var(--brand); color:#fff; box-shadow: var(--shadow2); }
    .btn--primary:hover{ background: var(--brand-dark); }
    .btn--ghost{ background: transparent; border-color: var(--border); }
    .btn--ghost:hover{ background: var(--soft); }

    /* Page */
    .page{
      padding: 22px 0 56px;
      background:
        radial-gradient(900px 500px at 80% 10%, rgba(225,29,46,.10), transparent 55%),
        radial-gradient(800px 500px at 20% 10%, rgba(15,23,42,.06), transparent 50%);
    }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      flex-wrap:wrap;
      margin-bottom: 14px;
    }

    .crumbs{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .crumb{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border:1px solid var(--border);
      background:#fff;
      border-radius: 999px;
      cursor:pointer;
      user-select:none;
      transition: background .15s ease, transform .12s ease, border-color .15s ease;
    }
    .crumb:hover{ background: var(--soft); }
    .crumb:active{ transform: translateY(1px); }
    .crumb:focus{ outline:none; box-shadow: var(--ring); }
    .sep{ opacity:.55; }

    .searchWrap{
      display:flex;
      align-items:center;
      gap:10px;
      flex: 1 1 360px;
      justify-content:flex-end;
      min-width: 260px;
    }
    input[type="search"]{
      width:min(620px, 100%);
      padding: 12px 12px;
      border-radius: 999px;
      border:1px solid var(--border);
      background:#fff;
      font: inherit;
      outline:none;
    }
    input[type="search"]:focus{ box-shadow: var(--ring); border-color: rgba(225,29,46,.35); }

    .panel{
      border:1px solid var(--border);
      border-radius: var(--radius);
      background:#fff;
      box-shadow: 0 6px 16px rgba(15,23,42,.05);
      padding: 16px;
    }

    .heading{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }
    .heading h1{
      margin:0;
      font-size: 18px;
      letter-spacing:-.01em;
    }
    .subhead{
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .countPill{
      font-weight: 950;
      border:1px solid var(--border);
      background: var(--soft);
      padding: 6px 10px;
      border-radius: 999px;
      color: rgba(15,23,42,.70);
    }

    /* GRID of blocks */
    .blocks{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }
    @media (max-width: 980px){
      .blocks{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 520px){
      .blocks{ grid-template-columns: 1fr; }
    }

    .blockCard{
      border:1px solid var(--border);
      border-radius: 18px;
      background:#fff;
      overflow:hidden;
      box-shadow: 0 10px 24px rgba(15,23,42,.06);
      cursor:pointer;
      transition: transform .12s ease, border-color .15s ease, box-shadow .15s ease;
      display:flex;
      flex-direction:column;
      min-height: 240px;
    }
    .blockCard:hover{
      transform: translateY(-2px);
      border-color: rgba(225,29,46,.22);
      box-shadow: var(--shadow2);
    }
    .blockCard:active{ transform: translateY(-1px); }
    .blockCard:focus{ outline:none; box-shadow: var(--ring); }

    .blockImg{
      height: 150px;
      background:
        radial-gradient(420px 240px at 22% 35%, rgba(225,29,46,.16), transparent 60%),
        radial-gradient(420px 240px at 78% 65%, rgba(15,23,42,.10), transparent 60%),
        var(--soft);
      display:grid;
      place-items:center;
      color: rgba(15,23,42,.55);
      font-weight: 950;
      letter-spacing:.08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    .blockBar{
      padding: 12px 12px;
      background: var(--brand);
      color:#fff;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .02em;
      font-size: 13px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .blockSmall{
      padding: 10px 12px 12px;
      color: rgba(15,23,42,.70);
      font-size: 13px;
    }
    .miniCount{
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.22);
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    /* Products */
    .products{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 14px;
      margin-top: 12px;
    }
    @media (max-width: 980px){
      .products{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 520px){
      .products{ grid-template-columns: 1fr; }
    }

    .product{
      border:1px solid var(--border);
      border-radius: 18px;
      background:#fff;
      box-shadow: 0 10px 24px rgba(15,23,42,.06);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: 240px;
      cursor: default;
    }
    .product.clickable{ cursor:pointer; }
    .product.clickable:hover{ border-color: rgba(225,29,46,.22); box-shadow: var(--shadow2); }
    .product:focus{ outline:none; box-shadow: var(--ring); }

    .pimg{
      height: 140px;
      background:
        radial-gradient(420px 240px at 22% 35%, rgba(225,29,46,.16), transparent 60%),
        radial-gradient(420px 240px at 78% 65%, rgba(15,23,42,.10), transparent 60%),
        var(--soft);
    }
    .pbody{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:8px;
      flex:1;
    }
    .meta{ display:flex; gap:8px; flex-wrap:wrap; }
    .tag{
      font-size: 12px;
      font-weight: 850;
      color: var(--muted);
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .product h3{
      margin:0;
      font-size: 16px;
      letter-spacing:-.01em;
    }
    .product p{
      margin:0;
      color: var(--muted);
      font-size: 13px;
    }
    .hint{
      margin-top:auto;
      padding-top: 10px;
      color: rgba(15,23,42,.55);
      font-size: 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .dot{
      width:8px; height:8px; border-radius:999px; background: rgba(225,29,46,.35);
    }

    /* Footer */
    .footer{
      border-top: 1px solid var(--border);
      padding: 20px 0;
      color: var(--muted);
      font-size: 13px;
      margin-top: 18px;
    }

    /* MODAL */
    .modalBackdrop{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 200;
    }
    .modalBackdrop[aria-hidden="false"]{ display:flex; }

    .modal{
      width: min(920px, 100%);
      background:#fff;
      border:1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(15,23,42,.20);
      overflow:hidden;
      max-height: min(88vh, 900px);
      display:flex;
      flex-direction:column;
    }
    .modalHeader{
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
    }
    .modalHeader h2{
      margin:0;
      font-size: 18px;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .modalHeader .sub{
      margin-top:6px;
      color: var(--muted);
      font-size: 13px;
    }
    .modalHeader .noteLine{
      margin-top: 8px;
      color: rgba(15,23,42,.72);
      font-size: 12px;
      font-weight: 900;
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--soft);
      border-radius: 999px;
    }
    .iconBtn{
      width:42px; height:42px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: var(--soft);
      cursor:pointer;
      font-weight: 950;
      display:grid;
      place-items:center;
      transition: transform .12s ease, background .15s ease;
      flex: 0 0 auto;
    }
    .iconBtn:hover{ background:#fff; }
    .iconBtn:active{ transform: translateY(1px); }
    .iconBtn:focus{ outline:none; box-shadow: var(--ring); }

    .modalBody{
      padding: 16px;
      overflow:auto;
      display:grid;
      gap: 14px;
    }

    .block{
      border:1px solid var(--border);
      border-radius: 18px;
      background:#fff;
      padding: 14px;
    }
    .block h3{
      margin:0 0 10px;
      font-size: 14px;
      letter-spacing: -.01em;
    }
    .bullets{
      margin:0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      display:grid;
      gap:6px;
    }

    .kv{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 720px){
      .kv{ grid-template-columns: 1fr; }
    }
    .kv .row{
      border:1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: var(--soft);
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size: 13px;
    }
    .kv .k{ color: var(--muted); font-weight: 700; }
    .kv .v{ color: var(--text); font-weight: 850; }

    table{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow:hidden;
      border:1px solid var(--border);
      border-radius: 16px;
      font-size: 13px;
    }
    thead th{
      text-align:left;
      padding: 10px 12px;
      background: var(--soft);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 900;
    }
    tbody td{
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tbody tr:last-child td{ border-bottom:none; }
    tbody td:first-child{ color: var(--muted); font-weight: 750; width: 52%; }

    .modalFooter{
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      display:flex;
      justify-content:flex-end;
      gap:10px;
      background: rgba(255,255,255,.9);
    }

    .note{
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <header class="header" aria-label="E-shop navigace">
    <div class="container header__inner">
      <a class="brand" href="index.html" aria-label="Zpět na hlavní web">
        <span class="brand__mark" aria-hidden="true">CT</span>
        <span class="brand__text">
          <strong>CT Praha</strong>
          <small>E-shop</small>
        </span>
      </a>

      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <a class="btn btn--ghost" href="index.html#kontakt">Kontakt</a>
        <a class="btn btn--primary" href="index.html">Hlavní web</a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">

      <div class="topbar">
        <div class="crumbs" id="crumbs" aria-label="Drobečková navigace"></div>

        <div class="searchWrap">
          <input id="q" type="search" placeholder="Hledat v produktech…" style="display:none;" />
          <button class="btn btn--ghost" id="backBtn" type="button" style="display:none;">Zpět</button>
          <button class="btn btn--ghost" id="homeBtn" type="button">Domů</button>
        </div>
      </div>

      <section class="panel" aria-label="Obsah">
        <div class="heading">
          <div>
            <h1 id="title">Kategorie</h1>
            <p class="subhead" id="subtitle">Vyberte oblast, kam chcete pokračovat.</p>
          </div>
          <div class="countPill" id="countPill">0</div>
        </div>

        <div id="view"></div>
        <p class="note" id="note"></p>
      </section>

      <footer class="footer">
        <div class="container" style="padding:0;">
          <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
            <span>© <span id="year"></span> CT Praha</span>
            <span><a href="index.html#kontakt" style="text-decoration:underline; text-underline-offset:3px;">Kontakt</a></span>
          </div>
        </div>
      </footer>

    </div>
  </main>

  <!-- MODAL (dynamický) -->
  <div class="modalBackdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc">
      <div class="modalHeader">
        <div>
          <h2 id="modalTitle"></h2>
          <div class="sub" id="modalDesc"></div>
          <div class="noteLine" id="modalNote" style="display:none;">týká se verze bez nástavných ramen</div>
        </div>
        <button class="iconBtn" type="button" id="modalClose" aria-label="Zavřít">✕</button>
      </div>

      <div class="modalBody" id="modalBody"></div>

      <div class="modalFooter">
        <button class="btn btn--ghost" type="button" id="modalClose2">Zavřít</button>
      </div>
    </div>
  </div>

                { id:"rolove-prisl", title:"Nástavná ramena, stojany a jiné příslušenství", subtitle:"Údržba a doplňky", type:"products", products:[
                  { id:"gum", name:"Čisticí guma", kind:"Příslušenství", sub:"Příslušenství", tags:["Příslušenství"] },
                  { id:"cistic", name:"Tekutý čistič na válce laminátorů", kind:"Příslušenství", sub:"Příslušenství", tags:["Příslušenství"] },
                  { id:"ramena", name:"Nastavitelná ramena (horní i dolní)", kind:"Příslušenství", sub:"Příslušenství", tags:["Příslušenství"] },
                  { id:"redukce", name:"Redukce středovek rolí (25 mm / 76 mm)", kind:"Příslušenství", sub:"Příslušenství", tags:["Příslušenství"] },
                  { id:"stojan", name:"Stojan pod laminátor", kind:"Příslušenství", sub:"Příslušenství", tags:["Příslušenství"] },
                ]},
              ]
            },

            {
              id:"laminovaci-folie",
              title:"Laminovací fólie",
              subtitle:"Dělení podle druhu, povrchové úpravy a lepidla.",
              type:"nodes",
              children:[
                { id:"folie-druh", title:"Podle druhu fólie", subtitle:"BOPP, PET, tlakem aktivované filmy.", type:"nodes", children:[
                  { id:"folie-bopp", title:"Polypropylenové fólie (BOPP)", subtitle:"Produkty BOPP.", type:"products", products:[
                    { id:"bopp-ss-mat", name:"BOPP s lepidlem Superstick matná", kind:"Laminovací fólie", sub:"BOPP", tags:["BOPP","Matná"] },
                    { id:"bopp-ss-lesk", name:"BOPP s lepidlem Superstick lesklá", kind:"Laminovací fólie", sub:"BOPP", tags:["BOPP","Lesklá"] },
                    { id:"bopp-lesk", name:"BOPP lesklá", kind:"Laminovací fólie", sub:"BOPP", tags:["BOPP","Lesklá"] },
                    { id:"bopp-mat", name:"BOPP matná", kind:"Laminovací fólie", sub:"BOPP", tags:["BOPP","Matná"] },
                    { id:"bopp-soft", name:"BOPP SoftTouch fólie matná", kind:"Laminovací fólie", sub:"BOPP", tags:["BOPP","SoftTouch"] },
                  ]},
                  { id:"folie-pet", title:"Polyesterové fólie (PET)", subtitle:"Produkty PET.", type:"products", products:[
                    { id:"pet-lesk", name:"Polyesterová fólie PET lesklá", kind:"Laminovací fólie", sub:"PET", tags:["PET","Lesklá"] },
                    { id:"pet-mat", name:"Polyesterová fólie PET matná", kind:"Laminovací fólie", sub:"PET", tags:["PET","Matná"] },
                  ]},
                  { id:"folie-tlak", title:"Filmy aktivované tlakem", subtitle:"Samolepící / tlakové.", type:"products", products:[
                    { id:"arctic-uni", name:"Arctic Universal lesklá fólie bez UV", kind:"Laminovací fólie", sub:"Tlakem", tags:["Tlakem","Lesklá"] },
                    { id:"arctic-uni-m", name:"Arctic Universal matná fólie bez UV", kind:"Laminovací fólie", sub:"Tlakem", tags:["Tlakem","Matná"] },
                  ]},
                ]},
                { id:"folie-povrch", title:"Podle povrchové úpravy", subtitle:"Lesklá / matná / speciální…", type:"nodes", children:[
                  { id:"povrch-placeholder", title:"(zatím prázdné)", subtitle:"Doplníme později.", type:"products", products:[] }
                ]},
                { id:"folie-lepidlo", title:"Podle druhu lepidla", subtitle:"Standard / vyšší adheze / samolepící…", type:"nodes", children:[
                  { id:"lepidlo-placeholder", title:"(zatím prázdné)", subtitle:"Doplníme později.", type:"products", products:[] }
                ]},
              ]
            },

            {
              id:"tonerove",
              title:"Tonerové efektové fólie",
              subtitle:"Efektní laminace / přenosy.",
              type:"products",
              products:[
                { id:"toner-1", name:"Tonerová efektová fólie – zlatá", kind:"Tonerová fólie", sub:"Laminovací technika", tags:["Tonerové efektové"] }
              ]
            },
            {
              id:"antibakterialni",
              title:"Antibakteriální fólie",
              subtitle:"Ochranné fólie pro povrchy.",
              type:"products",
              products:[
                { id:"anti-1", name:"Antibakteriální fólie – povrchy", kind:"Ochranná fólie", sub:"Laminovací technika", tags:["Antibakteriální"] }
              ]
            },
            {
              id:"bazar",
              title:"Bazar – použité stroje",
              subtitle:"Použité stroje dle skladu.",
              type:"products",
              products:[
                { id:"baz-1", name:"Bazar: laminátor (použitý)", kind:"Použitý stroj", sub:"Laminovací technika", tags:["Bazar"] }
              ]
            },
          ]
        },
      ]
    };

    // =========================
    // ROUTER
    // =========================
    const state = { path: ["root"], query: "" };

    const $view = document.getElementById("view");
    const $title = document.getElementById("title");
    const $subtitle = document.getElementById("subtitle");
    const $crumbs = document.getElementById("crumbs");
    const $count = document.getElementById("countPill");
    const $q = document.getElementById("q");
    const $backBtn = document.getElementById("backBtn");
    const $homeBtn = document.getElementById("homeBtn");
    const $note = document.getElementById("note");

    function findNodeByPath(){
      let node = SHOP;
      for (let i = 1; i < state.path.length; i++){
        const id = state.path[i];
        node = (node.children || []).find(c => c.id === id) || node;
      }
      return node;
    }

    function countItems(node){
      if (node.type === "nodes") return (node.children || []).length;
      if (node.type === "products") return (node.products || []).length;
      return 0;
    }

    function setSearchVisible(visible){
      $q.style.display = visible ? "" : "none";
      if (!visible){
        $q.value = "";
        state.query = "";
      }
    }

    function setBackVisible(visible){
      $backBtn.style.display = visible ? "" : "none";
    }

    function buildCrumbs(){
      const labels = [];
      let node = SHOP;
      labels.push({ id:"root", label:"CTPraha" });

      for (let i = 1; i < state.path.length; i++){
        const id = state.path[i];
        const next = (node.children || []).find(c => c.id === id);
        if (!next) break;
        labels.push({ id, label: next.title });
        node = next;
      }

      $crumbs.innerHTML = "";
      labels.forEach((c, idx) => {
        const el = document.createElement("button");
        el.className = "crumb";
        el.type = "button";
        el.textContent = c.label;
        el.addEventListener("click", () => {
          if (c.id === "root"){
            state.path = ["root"];
          } else {
            const newPath = ["root"];
            for (let i = 1; i < labels.length; i++){
              newPath.push(labels[i].id);
              if (labels[i].id === c.id) break;
            }
            state.path = newPath;
          }
          render();
        });
        $crumbs.appendChild(el);

        if (idx !== labels.length - 1){
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.textContent = "›";
          $crumbs.appendChild(sep);
        }
      });
    }

    function renderNodes(node){
      const items = node.children || [];
      $view.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "blocks";

      items.forEach(child => {
        const card = document.createElement("div");
        card.className = "blockCard";
        card.tabIndex = 0;
        card.setAttribute("role","button");
        card.setAttribute("aria-label", `Otevřít ${child.title}`);

        const img = document.createElement("div");
        img.className = "blockImg";
        img.textContent = "CT PRAHA";

        const bar = document.createElement("div");
        bar.className = "blockBar";

        const t = document.createElement("span");
        t.textContent = child.title.toUpperCase();

        const mc = document.createElement("span");
        mc.className = "miniCount";
        mc.textContent = String(countItems(child));

        bar.appendChild(t);
        bar.appendChild(mc);

        const small = document.createElement("div");
        small.className = "blockSmall";
        small.textContent = child.subtitle || "";

        card.appendChild(img);
        card.appendChild(bar);
        card.appendChild(small);

        const open = () => { state.path = [...state.path, child.id]; render(); };

        card.addEventListener("click", open);
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " "){
            e.preventDefault();
            open();
          }
        });

        grid.appendChild(card);
      });

      $view.appendChild(grid);
      $note.textContent = "Tip: Je to bloková navigace (klik → další bloky), jako na původním webu.";
    }

    function renderProducts(node){
      const all = node.products || [];

      const qq = (state.query || "").trim().toLowerCase();
      const filtered = !qq ? all : all.filter(p => {
        const name = (p.name || "").toLowerCase();
        const kind = (p.kind || "").toLowerCase();
        const sub = (p.sub || "").toLowerCase();
        const tags = (p.tags || []).join(" ").toLowerCase();
        return name.includes(qq) || kind.includes(qq) || sub.includes(qq) || tags.includes(qq);
      });

      $view.innerHTML = "";

      const grid = document.createElement("div");
      grid.className = "products";

      filtered.forEach(p => {
        const card = document.createElement("article");
        card.className = "product" + (p.detail ? " clickable" : "");
        card.tabIndex = 0;

        const img = document.createElement("div");
        img.className = "pimg";
        img.setAttribute("aria-hidden","true");

        const body = document.createElement("div");
        body.className = "pbody";

        const meta = document.createElement("div");
        meta.className = "meta";
        (p.tags || []).slice(0,3).forEach(t => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = t;
          meta.appendChild(tag);
        });

        const h3 = document.createElement("h3");
        h3.textContent = p.name;

        const desc = document.createElement("p");
        desc.textContent = p.kind || "Produkt";

        body.appendChild(meta);
        body.appendChild(h3);
        body.appendChild(desc);

        if (p.detail){
          const hint = document.createElement("div");
          hint.className = "hint";
          hint.innerHTML = `<span class="dot" aria-hidden="true"></span> Klikni pro detail`;
          body.appendChild(hint);

          const open = () => openModal(p.detail);

          card.addEventListener("click", open);
          card.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " "){
              e.preventDefault();
              open();
            }
          });
        }

        card.appendChild(img);
        card.appendChild(body);
        grid.appendChild(card);
      });

      $view.appendChild(grid);

      $note.textContent = all.length ? "Hledání je dostupné jen v úrovni produktů." : "Tahle sekce je zatím prázdná – doplníme produkty později.";
      $count.textContent = String(filtered.length);
    }

    function render(){
      const node = findNodeByPath();

      $title.textContent = node.title || "Kategorie";
      $subtitle.textContent = node.subtitle || "";

      buildCrumbs();

      setBackVisible(state.path.length > 1);
      setSearchVisible(node.type === "products");

      if (node.type === "nodes"){
        $count.textContent = String((node.children || []).length);
        renderNodes(node);
      } else if (node.type === "products"){
        renderProducts(node);
      } else {
        $count.textContent = "0";
        $view.innerHTML = "";
        $note.textContent = "";
      }
    }

    // =========================
    // Buttons
    // =========================
    $homeBtn.addEventListener("click", () => { state.path = ["root"]; render(); });
    $backBtn.addEventListener("click", () => {
      if (state.path.length > 1){
        state.path = state.path.slice(0, -1);
        render();
      }
    });
    $q.addEventListener("input", (e) => { state.query = e.target.value || ""; render(); });

    // =========================
    // MODAL: build content
    // =========================
    const backdrop = document.getElementById('modalBackdrop');
    const closeBtn = document.getElementById('modalClose');
    const closeBtn2 = document.getElementById('modalClose2');
    const $mTitle = document.getElementById('modalTitle');
    const $mDesc = document.getElementById('modalDesc');
    const $mBody = document.getElementById('modalBody');
    const $mNote = document.getElementById('modalNote');

    let lastFocus = null;

    function el(tag, cls, text){
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text != null) n.textContent = text;
      return n;
    }

    function buildKV(rows){
      const wrap = el("div", "kv");
      rows.forEach(([k,v]) => {
        const row = el("div", "row");
        const kk = el("span", "k", k);
        const vv = el("span", "v", v);
        row.appendChild(kk); row.appendChild(vv);
        wrap.appendChild(row);
      });
      return wrap;
    }

    function buildTable(rows){
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const trh = document.createElement("tr");
      const th1 = document.createElement("th"); th1.textContent = "Parametr";
      const th2 = document.createElement("th"); th2.textContent = "Hodnota";
      trh.appendChild(th1); trh.appendChild(th2);
      thead.appendChild(trh);

      const tbody = document.createElement("tbody");
      rows.forEach(([k,v]) => {
        const tr = document.createElement("tr");
        const td1 = document.createElement("td"); td1.textContent = k;
        const td2 = document.createElement("td"); td2.textContent = v;
        tr.appendChild(td1); tr.appendChild(td2);
        tbody.appendChild(tr);
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      return table;
    }

    function openModal(detailId){
      const d = DETAILS[detailId];
      if (!d) return;

      lastFocus = document.activeElement;

      $mTitle.textContent = d.title || "";
      $mDesc.textContent = d.desc || "";

      if (d.note){
        $mNote.style.display = "inline-flex";
        $mNote.textContent = d.note;
      } else {
        $mNote.style.display = "none";
      }

      $mBody.innerHTML = "";

      if (d.bullets && d.bullets.length){
        const block = el("div","block");
        block.appendChild(el("h3","", "Popis"));
        const ul = el("ul","bullets");
        d.bullets.forEach(b => {
          const li = document.createElement("li");
          li.textContent = b;
          ul.appendChild(li);
        });
        block.appendChild(ul);
        $mBody.appendChild(block);
      }

      if (d.usage && d.usage.length){
        const block = el("div","block");
        block.appendChild(el("h3","", "Možnosti využití"));
        block.appendChild(buildKV(d.usage));
        $mBody.appendChild(block);
      }

      if (d.equip && d.equip.length){
        const block = el("div","block");
        block.appendChild(el("h3","", "Výbava a příslušenství"));
        block.appendChild(buildKV(d.equip));
        $mBody.appendChild(block);
      }

      if (d.spec && d.spec.length){
        const block = el("div","block");
        block.appendChild(el("h3","", "Technická specifikace"));
        block.appendChild(buildTable(d.spec));
        $mBody.appendChild(block);
      }

      backdrop.setAttribute('aria-hidden', 'false');
      closeBtn.focus();
      document.body.style.overflow = 'hidden';
    }

    function closeModal(){
      backdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (lastFocus && typeof lastFocus.focus === 'function') lastFocus.focus();
    }

    closeBtn.addEventListener('click', closeModal);
    closeBtn2.addEventListener('click', closeModal);

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (backdrop.getAttribute('aria-hidden') === 'false' && e.key === 'Escape'){
        e.preventDefault();
        closeModal();
      }
    });

    // init
    render();
  </script>
</body>
</html>
